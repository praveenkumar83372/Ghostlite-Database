<!DOCTYPE html>
<html>
<head>

<title>Ghostlite Admin Panel</title>

<style>

body{
font-family:Arial;
margin:40px;
}

textarea{
width:500px;
height:80px;
}

button{
padding:8px 15px;
margin-top:10px;
}

table{
border-collapse:collapse;
margin-top:20px;
}

td,th{
border:1px solid #aaa;
padding:6px 10px;
}

</style>

</head>

<body>

<h1>Ghostlite Admin Panel</h1>

<h2>Tables</h2>

<ul id="tables"></ul>

<h2>SQL Query</h2>

<textarea id="sql"></textarea><br>

<button onclick="runQuery()">Run Query</button>

<h2 id="tableTitle"></h2>

<table id="dataTable"></table>

<script>

fetch("/tables")
.then(r=>r.json())
.then(data=>{

const list=document.getElementById("tables")

data.forEach(t=>{

const li=document.createElement("li")

li.innerText=t

li.onclick=()=>loadTable(t)

list.appendChild(li)

})

})

function loadTable(name){

fetch("/table/"+name)
.then(r=>r.json())
.then(showTable)

}

function showTable(rows){

const table=document.getElementById("dataTable")

table.innerHTML=""

if(rows.length===0)return

const header=document.createElement("tr")

Object.keys(rows[0]).forEach(col=>{

const th=document.createElement("th")

th.innerText=col

header.appendChild(th)

})

table.appendChild(header)

rows.forEach(r=>{

const tr=document.createElement("tr")

Object.values(r).forEach(v=>{

const td=document.createElement("td")

td.innerText=v

tr.appendChild(td)

})

table.appendChild(tr)

})

}

function runQuery(){

const sql=document.getElementById("sql").value

fetch("/query?sql="+encodeURIComponent(sql))
.then(r=>r.json())
.then(showTable)

}

</script>

</body>
</html>
